name: build-test-2350CR

# Build the SKPICO_2350CR firmware variant
# and run the rp2350js-based emulator test (tests/run_tests.sh).
#
# The firmware is an RP2350 (Cortex-M33) build, cross-compiled with the
# arm-none-eabi GCC toolchain. The Pico SDK 2.x and pico-extras are fetched
# from git by CMake's FetchContent (PICO_SDK_FETCH_FROM_GIT is enabled in
# Source/CMakeLists.txt); the resulting _deps tree is cached across runs to
# avoid re-cloning/re-building the SDK on every CI run.

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: build-test-2350CR-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM embedded toolchain
        # gcc-arm-none-eabi on Ubuntu 24.04 ships arm-none-eabi-gcc 13.2.x,
        # which satisfies the Pico SDK 2.x minimum (>= 10.3). The newlib /
        # libstdc++-newlib packages provide the C/C++ runtime the firmware
        # needs (reSID is C++).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            cmake ninja-build

      - name: Set up Python
        # The Pico SDK build invokes several Python scripts (e.g. the platform
        # generator), so a working python3 is required.
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        # tests/test_runner.js is an ES module and needs Node >= 18; pin to 22
        # to match the version the harness is developed against.
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Cache Pico SDK / pico-extras (FetchContent _deps)
        # FetchContent clones the SDK into build-2350CR/_deps. The import
        # .cmake files pin GIT_TAG to master (not a fixed tag), so we key the
        # cache on run_id (always writes a fresh entry) and restore via the
        # stable prefix (always picks up the most recent cached tree). GitHub
        # evicts stale caches automatically.
        uses: actions/cache@v4
        with:
          path: Source/build-2350CR/_deps
          key: pico-2350CR-deps-${{ github.run_id }}
          restore-keys: |
            pico-2350CR-deps-

      - name: Configure (CMake)
        # Matches the variant documented in Source/CMakeLists.txt:
        #   -DPICO_PLATFORM=rp2350-arm-s -DSKPICO_VARIANT=SKPICO_2350CR
        # PICO_BOARD defaults to pico2 for the rp2350 platform; set it
        # explicitly for determinism, along with a Release build type.
        run: |
          cmake -S Source -B Source/build-2350CR -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_PLATFORM=rp2350-arm-s \
            -DPICO_BOARD=pico2 \
            -DSKPICO_VARIANT=SKPICO_2350CR

      - name: Build firmware
        run: cmake --build Source/build-2350CR --parallel "$(nproc)"

      - name: Verify build artifacts exist
        # The test harness needs both the .uf2 (loaded by the emulator) and
        # the .elf.map (parsed by getOffsetForVariable to locate RAM globals
        # such as newSample / SID_CMD). Fail early with a clear message if
        # either is missing.
        run: |
          test -f Source/build-2350CR/SKpico.uf2
          test -f Source/build-2350CR/SKpico.elf.map

      - name: Run emulator tests
        # tests/run_tests.sh installs the rp2350js dependency, checks the
        # firmware is present, and invokes tests/test_runner.js. It reads
        # BUILD_DIR (defaults to build-2350CR) to locate the firmware under
        # ../Source/.
        run: ./run_tests.sh
        working-directory: tests

      - name: Publish rolling release
        # Publish the freshly built firmware as a rolling GitHub Release so
        # it's publicly downloadable without login. Each branch gets its own
        # rolling release tagged `latest-<branch>`; every push to that branch
        # replaces the previous build's assets. The permalink is stable:
        #   https://github.com/<owner>/<repo>/releases/download/latest-<branch>/SKpico.uf2
        # `main` is published as a regular release (so it stays the repo's
        # "latest"); other branches are marked --prerelease so they don't
        # displace main in the Releases sidebar. Runs only on push/dispatch,
        # not on pull_request events (those have no branch to publish).
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -e
          TAG="latest-${BRANCH}"
          # Glob build-* so this picks up whichever build dir the Configure
          # step created (build-2350CR today, but won't need editing if the
          # variant/build dir name changes). Bash expands the globs at
          # assignment; if no match, the literal pattern is kept and gh will
          # error out (fail-fast).
          ASSETS=(
            Source/build-*/SKpico.uf2
            Source/build-*/SKpico.elf
            Source/build-*/SKpico.elf.map
            Source/build-*/SKpico.bin
            Source/build-*/SKpico.dis
          )
          PRERELEASE_FLAG=""
          if [ "$BRANCH" != "main" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # Delete any previous rolling release for this branch, then create a
          # fresh one pointing at the just-pushed commit. --cleanup-tag removes
          # the git tag too; both are recreated by `release create`.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --title "Latest build: ${BRANCH}" \
            --notes "Auto-built firmware from commit ${COMMIT} on branch \`${BRANCH}\`.

          This is a rolling release; it is replaced on every push to \`${BRANCH}\`. Download artifacts below (no GitHub login required)." \
            --target "$COMMIT" \
            $PRERELEASE_FLAG \
            "${ASSETS[@]}"
